<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F0F6FF">
    <link rel="apple-touch-icon" href="icon.png">
    <title>メモ管理アプリ - Memo Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bp-bg:           #F8FAFC;
            --bp-blue-pale:    #EFF6FF;
            --bp-blue-soft:    #BFDBFE;
            --bp-blue-deep:    #2563EB;
            --bp-blue-ink:     #1D4ED8;
            --bp-accent-pale:  #EFF6FF;
            --bp-accent-soft:  #93C5FD;
            --bp-accent-deep:  #2563EB;
            --bp-accent-ink:   #1E40AF;
            --bp-white:        #FFFFFF;
            --bp-text:         #1E293B;
            --bp-text-soft:    #64748B;
            --bp-title:        #1E3A8A;
            --bp-border:       #E2E8F0;
            --bp-success:      #10B981;
            --bp-success-soft: #D1FAE5;
            --bp-shadow-sm:    0 2px 8px rgba(37, 99, 235, 0.06);
            --bp-shadow-md:    0 8px 24px rgba(37, 99, 235, 0.08);
            --bp-shadow-accent:0 8px 24px rgba(37, 99, 235, 0.28);
            --bp-radius-sm:    8px;
            --bp-radius-md:    16px;
            --bp-radius-lg:    24px;
            --bp-radius-pill:  999px;
            --bp-gradient:     linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            --bp-gradient-hero:linear-gradient(135deg, #1E3A8A 0%, #2563EB 60%, #3B82F6 100%);
        }
        .dark {
            --bp-bg:           #0B1220;
            --bp-blue-pale:    #1E293B;
            --bp-blue-soft:    #334155;
            --bp-blue-deep:    #3B82F6;
            --bp-blue-ink:     #60A5FA;
            --bp-accent-pale:  #1E293B;
            --bp-accent-soft:  #475569;
            --bp-accent-deep:  #3B82F6;
            --bp-accent-ink:   #93C5FD;
            --bp-white:        #111827;
            --bp-text:         #E2E8F0;
            --bp-text-soft:    #94A3B8;
            --bp-title:        #93C5FD;
            --bp-border:       #1F2937;
            --bp-success:      #34D399;
            --bp-success-soft: #064E3B;
            --bp-shadow-sm:    0 2px 8px rgba(0,0,0,0.3);
            --bp-shadow-md:    0 8px 24px rgba(0,0,0,0.35);
            --bp-shadow-accent:0 8px 24px rgba(59,130,246,0.25);
            --bp-gradient:     linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            --bp-gradient-hero:linear-gradient(135deg, #1E3A8A 0%, #2563EB 60%, #3B82F6 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            background: var(--bp-bg);
            min-height: 100vh;
            color: var(--bp-text);
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* ヘッダー */
        .header-container {
            background: var(--bp-white);
            border-bottom: 1px solid var(--bp-border);
            box-shadow: var(--bp-shadow-sm);
            transition: background 0.3s, border-color 0.3s;
        }

        /* カードの装飾 */
        .memo-card {
            background: var(--bp-white);
            border: 1px solid var(--bp-border);
            border-radius: var(--bp-radius-lg);
            box-shadow: var(--bp-shadow-md);
            transition: all 0.25s ease;
        }
        .memo-card:active {
            transform: scale(0.98);
            box-shadow: var(--bp-shadow-accent);
            border-color: var(--bp-accent-soft);
        }

        /* タブ */
        .tab-pill {
            padding: 0.5rem 1.2rem;
            border-radius: var(--bp-radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1.5px solid var(--bp-border);
            background: var(--bp-white);
            color: var(--bp-text-soft);
            cursor: pointer;
        }
        .tab-pill:hover { background: var(--bp-accent-pale); border-color: var(--bp-accent-soft); color: var(--bp-accent-deep); }
        .tab-pill.active {
            background: var(--bp-accent-pale);
            color: var(--bp-accent-deep);
            border-color: var(--bp-accent-deep);
        }

        /* 主要ボタン */
        .btn-main {
            background: var(--bp-gradient);
            color: #fff;
            border-radius: var(--bp-radius-pill);
            font-weight: 700;
            box-shadow: var(--bp-shadow-accent);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-main:hover { transform: scale(0.98); opacity: 0.9; }
        .btn-main:active { transform: scale(0.95); }
        .btn-main:disabled { background: #CBD5E0; color: #A0AEC0; box-shadow: none; cursor: default; transform: none; }

        .btn-sub {
            background: var(--bp-accent-pale);
            color: var(--bp-accent-ink);
            border-radius: var(--bp-radius-md);
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid var(--bp-border);
            cursor: pointer;
        }
        .btn-sub:hover { background: var(--bp-accent-soft); border-color: var(--bp-accent-deep); color: #fff; }

        .input-or {
            background: var(--bp-white);
            border: 1.5px solid var(--bp-border);
            border-radius: var(--bp-radius-md);
            color: var(--bp-text);
            transition: border-color 0.2s;
            outline: none;
        }
        .input-or:focus { border-color: var(--bp-accent-deep); box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }

        /* カテゴリバッジ色 */
        .badge-学習 { background: #DBEAFE; color: #1D4ED8; }
        .badge-趣味 { background: #EDE9FE; color: #6D28D9; }
        .badge-食事 { background: #FFF7ED; color: #C2410C; }
        .badge-Todo { background: #DCFCE7; color: #15803D; }
        .badge-その他 { background: #F1F5F9; color: #475569; }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.55);
        }

        /* 日付クイック選択 */
        .date-chip {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--bp-border);
            background: var(--bp-white);
            color: var(--bp-text-soft);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .date-chip:hover { background: var(--bp-accent-pale); border-color: var(--bp-accent-soft); color: var(--bp-accent-deep); }
        .date-chip:active { transform: scale(0.96); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade-up { animation: fadeUp 0.25s ease-out; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .anim-slide-up { animation: slideUp 0.3s ease-out; }

        /* ボトムナビゲーション */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bp-white);
            border-top: 1px solid var(--bp-border);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 env(safe-area-inset-bottom, 8px);
            z-index: 40;
            transition: background 0.3s;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 600;
            color: var(--bp-text-soft);
            cursor: pointer;
            border: none;
            background: none;
            transition: color 0.2s;
            border-radius: 12px;
        }
        .bottom-nav-item.active { color: var(--bp-accent-deep); }
        .bottom-nav-item .nav-icon-wrap {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; transition: background 0.2s;
        }
        .bottom-nav-item.active .nav-icon-wrap { background: var(--bp-accent-pale); }

        /* FABの調整 */
        .fab-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 20;
            box-shadow: 0 8px 22px rgba(37,99,235,0.40);
        }

        /* カレンダー */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-cell {
            aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--bp-text);
            position: relative;
        }
        .cal-cell:active { transform: scale(0.9); }
        .cal-cell.today { background: var(--bp-accent-pale); color: var(--bp-accent-deep); }
        .cal-cell.selected { background: var(--bp-gradient); color: #fff; }
        .cal-cell.has-memo::after {
            content: '';
            width: 5px; height: 5px;
            background: var(--bp-accent-deep);
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }
        .cal-cell.selected.has-memo::after { background: #fff; }
        .cal-cell.other-month { color: var(--bp-text-soft); opacity: 0.4; }
        .cal-header-cell {
            font-size: 11px; font-weight: 700; color: var(--bp-text-soft);
            text-align: center; padding: 8px 0;
        }
        .cal-header-cell.sun { color: #EF4444; }
        .cal-header-cell.sat { color: var(--bp-accent-deep); }

        /* ヒーローカード */
        .hero-card {
            background: var(--bp-gradient-hero);
            color: #fff;
            border-radius: var(--bp-radius-lg);
            padding: 22px 22px 20px;
            box-shadow: var(--bp-shadow-accent);
            position: relative;
            overflow: hidden;
        }
        .hero-card::before {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            top: -80px; right: -60px;
        }
        .hero-card::after {
            content: '';
            position: absolute;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            bottom: -40px; left: -30px;
        }
        .hero-card > * { position: relative; z-index: 1; }
        .progress-track {
            height: 8px;
            background: rgba(255,255,255,0.22);
            border-radius: 999px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #fff;
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* Todoチェックボックス */
        .todo-check {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid var(--bp-border);
            background: var(--bp-white);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            flex-shrink: 0;
            padding: 0;
        }
        .todo-check:hover { border-color: var(--bp-success); }
        .todo-check.done {
            background: var(--bp-success);
            border-color: var(--bp-success);
        }
        .todo-check:active { transform: scale(0.9); }

        /* ダークモードトグル */
        .dark-toggle {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--bp-border);
            background: var(--bp-white);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .dark-toggle:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ["学習", "趣味", "食事", "Todo"];

        // SVGアイコン
        const Icons = {
            edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
            plus: <path d="M5 12h14m-7-7v14" />,
            search: <><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></>,
            trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></>,
            clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
            upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
            image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
            file: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>,
            check: <polyline points="20 6 9 17 4 12" />,
            x: <><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></>,
            sun: <><circle cx="12" cy="12" r="5"/><line x1="12" x2="12" y1="1" y2="3"/><line x1="12" x2="12" y1="21" y2="23"/><line x1="4.22" x2="5.64" y1="4.22" y2="5.64"/><line x1="18.36" x2="19.78" y1="18.36" y2="19.78"/><line x1="1" x2="3" y1="12" y2="12"/><line x1="21" x2="23" y1="12" y2="12"/><line x1="4.22" x2="5.64" y1="19.78" y2="18.36"/><line x1="18.36" x2="19.78" y1="5.64" y2="4.22"/></>,
            moon: <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
            home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
            calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
            chevronL: <polyline points="15 18 9 12 15 6"/>,
            chevronR: <polyline points="9 18 15 12 9 6"/>,
        };
        const Icon = ({ name, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                {Icons[name]}
            </svg>
        );

        // ローカル時刻を datetime-local が期待する YYYY-MM-DDTHH:mm 形式にする
        const toLocalDateTimeString = (d) => {
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const DATE_PRESETS = [
            { label: "今", days: 0 },
            { label: "明日", days: 1 },
            { label: "3日後", days: 3 },
            { label: "1週間後", days: 7 },
            { label: "2週間後", days: 14 },
            { label: "1ヶ月後", days: 30 },
        ];

        // フォームの state を内部に閉じ込め、App の再レンダリングを防ぐ
        const MemoForm = React.memo(({ initialValues, editingId, onSubmit, onClose }) => {
            const [content, setContent] = useState(initialValues.content);
            const [category, setCategory] = useState(initialValues.category);
            const [date, setDate] = useState(initialValues.date);
            const [files, setFiles] = useState(initialValues.files || []);

            const handleFileUpload = (e) => {
                const uploaded = Array.from(e.target.files);
                uploaded.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFiles(prev => [...prev, { name: file.name, type: file.type, data: reader.result }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const applyPreset = (preset) => {
                const d = new Date();
                d.setDate(d.getDate() + preset.days);
                setDate(toLocalDateTimeString(d));
            };

            const handleSave = () => {
                if (!content.trim()) return;
                onSubmit({ content, category, date, files });
            };

            return (
                <div className="fixed inset-0 modal-overlay z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="w-full max-w-lg rounded-t-3xl sm:rounded-3xl shadow-2xl anim-slide-up flex flex-col" style={{background: 'var(--bp-white)', border: '1px solid var(--bp-border)', maxHeight: '85vh'}}>
                        <div className="flex justify-between items-center p-5 pb-3 flex-shrink-0">
                            <h2 className="text-lg font-bold" style={{color: 'var(--bp-text)'}}>{editingId ? "メモの編集" : "新しいメモ"}</h2>
                            <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-[var(--bp-accent-pale)] transition-all" style={{color: 'var(--bp-text-soft)'}}>
                                <Icon name="x" size={20} />
                            </button>
                        </div>
                        <div className="overflow-y-auto flex-1 px-5 pb-2 space-y-4">
                            <div className="flex gap-3">
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold uppercase mb-1 block" style={{color: 'var(--bp-text-soft)'}}>カテゴリ</label>
                                    <select
                                        className="w-full px-3 py-2.5 input-or text-sm"
                                        value={category}
                                        onChange={(e) => setCategory(e.target.value)}
                                    >
                                        {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold uppercase mb-1 block" style={{color: 'var(--bp-text-soft)'}}>日時</label>
                                    <input
                                        type="datetime-local"
                                        className="w-full px-3 py-2.5 input-or text-sm"
                                        value={date}
                                        onChange={(e) => setDate(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="flex gap-1.5 flex-wrap -mt-2">
                                {DATE_PRESETS.map(p => (
                                    <button key={p.label} type="button" onClick={() => applyPreset(p)} className="date-chip">
                                        {p.label}
                                    </button>
                                ))}
                            </div>
                            <textarea
                                autoFocus
                                className="w-full px-4 py-3 min-h-[120px] input-or resize-none text-sm leading-relaxed"
                                placeholder="ここに入力..."
                                value={content}
                                onChange={(e) => setContent(e.target.value)}
                            />
                        </div>
                        <div className="flex items-center gap-2 p-5 pt-3 flex-shrink-0" style={{borderTop: '1px solid var(--bp-border)', paddingBottom: 'calc(1.25rem + env(safe-area-inset-bottom))'}}>
                            <label className="cursor-pointer px-4 py-2.5 btn-sub flex items-center gap-2 text-sm">
                                <Icon name="image" size={18} /> 添付
                                <input type="file" className="hidden" multiple accept="image/*,audio/*" onChange={handleFileUpload} />
                            </label>
                            <button
                                onClick={handleSave}
                                disabled={!content.trim()}
                                className="flex-1 py-3 btn-main text-sm"
                            >
                                {editingId ? "更新する" : "保存する"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        });

        const App = () => {
            const [memos, setMemos] = useState([]);
            const [activeTab, setActiveTab] = useState("すべて");
            const [searchQuery, setSearchQuery] = useState("");
            const [formDefaults, setFormDefaults] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [statusMsg, setStatusMsg] = useState("");
            const [darkMode, setDarkMode] = useState(false);
            const [currentView, setCurrentView] = useState("home");
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [calYear, setCalYear] = useState(new Date().getFullYear());
            const [selectedDate, setSelectedDate] = useState(null);
            const [holidays, setHolidays] = useState({});

            // 祝日データの取得
            useEffect(() => {
                fetch('https://holidays-jp.github.io/api/v1/date.json')
                    .then(res => res.json())
                    .then(data => setHolidays(data))
                    .catch(() => console.error("祝日データの取得に失敗しました"));
            }, []);

            // ダークモード切替
            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
            }, [darkMode]);

            // Load
            useEffect(() => {
                const saved = localStorage.getItem('my_personal_memos');
                if (saved) { try { setMemos(JSON.parse(saved)); } catch {} }
            }, []);

            // Save
            useEffect(() => {
                localStorage.setItem('my_personal_memos', JSON.stringify(memos));
            }, [memos]);

            const showStatus = (text) => {
                setStatusMsg(text);
                setTimeout(() => setStatusMsg(""), 3000);
            };

            const openNewForm = () => {
                setFormDefaults({ content: "", category: "Todo", date: toLocalDateTimeString(new Date()), files: [] });
                setEditingId(null);
            };

            const handleEditMemo = (memo) => {
                setFormDefaults({
                    content: memo.content,
                    category: memo.category,
                    date: memo.date,
                    files: memo.files || []
                });
                setEditingId(memo.id);
            };

            const closeForm = () => {
                setFormDefaults(null);
                setEditingId(null);
            };

            const handleSaveMemo = (values) => {
                if (editingId) {
                    setMemos(memos.map(m => m.id === editingId ? { ...m, ...values, timestamp: new Date(values.date).getTime() } : m));
                    showStatus("メモを更新しました");
                } else {
                    setMemos([{ ...values, id: Date.now(), timestamp: new Date(values.date).getTime(), done: false }, ...memos]);
                    showStatus("メモを保存しました");
                }
                closeForm();
            };

            const handleDeleteMemo = (id) => {
                if (!confirm("このメモを削除してもよろしいですか？")) return;
                setMemos(memos.filter(m => m.id !== id));
            };

            const toggleDone = (id) => {
                setMemos(memos.map(m => m.id === id ? { ...m, done: !m.done } : m));
            };

            const todoStats = useMemo(() => {
                const todos = memos.filter(m => m.category === "Todo");
                return { total: todos.length, done: todos.filter(m => m.done).length };
            }, [memos]);

            const filteredMemos = useMemo(() => {
                return memos
                    .filter(m => activeTab === "すべて" || m.category === activeTab)
                    .filter(m => m.content.toLowerCase().includes(searchQuery.toLowerCase()) || m.category.includes(searchQuery))
                    .sort((a, b) => b.timestamp - a.timestamp);
            }, [memos, activeTab, searchQuery]);

            // === エクセル保存 ===
            const exportToExcel = () => {
                if (memos.length === 0) { showStatus("保存するメモがありません"); return; }
                const rows = memos.map(m => ({
                    "日時": m.date ? m.date.replace('T', ' ') : '',
                    "カテゴリ": m.category,
                    "内容": m.content
                }));
                const ws = XLSX.utils.json_to_sheet(rows);
                /* 列幅の設定 */
                ws['!cols'] = [{ wch: 18 }, { wch: 10 }, { wch: 60 }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "メモ一覧");
                XLSX.writeFile(wb, `メモ_${new Date().toISOString().slice(0,10)}.xlsx`);
                showStatus("Excelファイルを保存しました");
            };

            // === エクセル読み込み ===
            const importFromExcel = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const wb = XLSX.read(e.target.result, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(ws, { defval: "" });

                        const imported = json.map((row, i) => {
                            const content = row["内容"] || row["content"] || row["Content"] || "";
                            const category = row["カテゴリ"] || row["category"] || "Todo";
                            const dateStr = row["日時"] || row["date"] || new Date().toISOString().slice(0, 16);
                            const normalizedDate = dateStr.replace(' ', 'T').slice(0, 16);
                            // カテゴリが存在しない場合「Todo」にフォールバック
                            const validCat = CATEGORIES.includes(category) ? category : "Todo";
                            return {
                                id: Date.now() + i,
                                content,
                                category: validCat,
                                date: normalizedDate,
                                timestamp: new Date(normalizedDate).getTime() || Date.now(),
                                files: []
                            };
                        }).filter(m => m.content.trim());

                        if (imported.length === 0) {
                            showStatus("読み込めるメモが見つかりませんでした");
                            return;
                        }

                        if (confirm(`${imported.length}件のメモが見つかりました。今のリストに追加しますか？\n（「キャンセル」で上書きします）`)) {
                            setMemos(prev => [...prev, ...imported]);
                        } else {
                            if (confirm("現在のメモを消去して上書きしてもよろしいですか？")) {
                                setMemos(imported);
                            }
                        }
                        showStatus(`${imported.length}件を読み込みました`);
                    } catch (err) {
                        showStatus("ファイルの読み込みに失敗しました");
                    }
                };
                reader.readAsArrayBuffer(file);
                event.target.value = "";
            };

            const badgeClass = (cat) => `badge-${cat}`;

            // カレンダーヘルパー
            const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
            const getFirstDayOfMonth = (y, m) => new Date(y, m, 1).getDay();
            const calendarCells = useMemo(() => {
                const days = getDaysInMonth(calYear, calMonth);
                const firstDay = getFirstDayOfMonth(calYear, calMonth);
                const prevDays = getDaysInMonth(calYear, calMonth - 1);
                const cells = [];
                for (let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevDays - i, current: false });
                for (let i = 1; i <= days; i++) cells.push({ day: i, current: true });
                const remain = 42 - cells.length;
                for (let i = 1; i <= remain; i++) cells.push({ day: i, current: false });
                return cells;
            }, [calYear, calMonth]);

            const memoDates = useMemo(() => {
                const s = new Set();
                memos.forEach(m => { if (m.date) s.add(m.date.slice(0, 10)); });
                return s;
            }, [memos]);

            const todayStr = new Date().toISOString().slice(0, 10);
            const today = new Date();

            const calDateMemos = useMemo(() => {
                if (!selectedDate) return [];
                return memos.filter(m => m.date && m.date.slice(0, 10) === selectedDate).sort((a, b) => b.timestamp - a.timestamp);
            }, [memos, selectedDate]);

            const prevMonth = () => { if (calMonth === 0) { setCalMonth(11); setCalYear(calYear - 1); } else setCalMonth(calMonth - 1); };
            const nextMonth = () => { if (calMonth === 11) { setCalMonth(0); setCalYear(calYear + 1); } else setCalMonth(calMonth + 1); };

            return (
                <div className="min-h-screen pb-24">

                    {/* ===== ヘッダー ===== */}
                    <header className="header-container sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
                            <h1 className="text-xl font-bold flex items-center gap-2" style={{color: 'var(--bp-title)'}}>
                                <span className="text-2xl">💎</span>
                                <span>Memo Hub</span>
                            </h1>
                            <div className="flex items-center gap-1.5">
                                <button onClick={() => setDarkMode(!darkMode)} className="dark-toggle">
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                                <button onClick={exportToExcel} className="px-2.5 py-2 rounded-xl text-sm font-semibold flex items-center gap-1 transition-all hover:bg-[var(--bp-accent-pale)] text-[var(--bp-text-soft)] hover:text-[var(--bp-accent-deep)]" title="エクセル保存">
                                    <Icon name="download" size={16} />
                                </button>
                                <label className="px-2.5 py-2 rounded-xl text-sm font-semibold flex items-center gap-1 transition-all cursor-pointer hover:bg-[var(--bp-accent-pale)] text-[var(--bp-text-soft)] hover:text-[var(--bp-accent-deep)]" title="エクセル読込">
                                    <Icon name="upload" size={16} />
                                    <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={importFromExcel} />
                                </label>
                            </div>
                        </div>
                    </header>

                    {/* ===== ステータスメッセージ ===== */}
                    {statusMsg && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 anim-fade-up" style={{zIndex: 9999}}>
                            <div className="px-6 py-2.5 rounded-full shadow-xl font-bold text-sm text-white flex items-center gap-2" style={{background: 'var(--bp-accent-deep)'}}>
                                <Icon name="check" size={18} /> {statusMsg}
                            </div>
                        </div>
                    )}

                    {/* ===== メインコンテンツ ===== */}
                    <main className="max-w-4xl mx-auto px-4 py-4 pb-24">

                    {currentView === "home" && (<>

                        {/* ヒーローカード */}
                        <div className="hero-card mb-5 anim-fade-up">
                            <div style={{fontSize: '12px', opacity: 0.85, fontWeight: 600, letterSpacing: '0.04em'}}>WELCOME BACK 👋</div>
                            <h2 style={{fontSize: '26px', fontWeight: 700, marginTop: 4, letterSpacing: '-0.01em', lineHeight: 1.2}}>
                                メモ {memos.length} 件を管理中
                            </h2>
                            {todoStats.total > 0 ? (
                                <div style={{marginTop: 18}}>
                                    <div className="flex items-center justify-between" style={{fontSize: '12px', fontWeight: 600, opacity: 0.95}}>
                                        <span>Todo 進捗</span>
                                        <span>{todoStats.done} / {todoStats.total}</span>
                                    </div>
                                    <div className="progress-track">
                                        <div className="progress-fill" style={{width: `${(todoStats.done / todoStats.total) * 100}%`}} />
                                    </div>
                                </div>
                            ) : (
                                <div style={{marginTop: 14, fontSize: '12px', opacity: 0.85}}>右下の＋ボタンから新しいメモを追加できます</div>
                            )}
                        </div>

                        {/* 検索 */}
                        <div className="mb-5">
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2" style={{color: 'var(--bp-accent-deep)'}}>
                                    <Icon name="search" size={18} />
                                </div>
                                <input
                                    type="text"
                                    placeholder="内容やカテゴリで検索..."
                                    className="w-full pl-11 pr-4 py-3.5 input-or text-sm"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* カテゴリタブ */}
                        <div className="flex gap-2 overflow-x-auto pb-4 scrollbar-hide mb-4">
                            {["すべて", ...CATEGORIES].map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveTab(cat)}
                                    className={`tab-pill ${activeTab === cat ? 'active' : ''}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* メモカード一覧 */}
                        <div className="space-y-4">
                            {filteredMemos.length > 0 ? (
                                filteredMemos.map(memo => (
                                    <div key={memo.id} className="memo-card p-5 group anim-fade-up">
                                        <div className="flex items-start justify-between mb-2">
                                            <div className="flex flex-wrap items-center gap-2.5">
                                                <span className="flex items-center gap-1 text-xs font-medium" style={{color: 'var(--bp-text-soft)'}}>
                                                    <Icon name="clock" size={13} />
                                                    {memo.date ? memo.date.replace('T', ' ') : ''}
                                                </span>
                                                <span className={`px-2.5 py-0.5 text-[10px] font-bold rounded-full ${badgeClass(memo.category)}`}>
                                                    {memo.category}
                                                </span>
                                            </div>
                                            <div className="flex gap-1">
                                                <button
                                                    onClick={() => handleEditMemo(memo)}
                                                    className="p-1.5 opacity-40 active:opacity-100 transition-all rounded-lg hover:bg-[var(--bp-accent-pale)]"
                                                    style={{color: 'var(--bp-text-soft)'}}
                                                >
                                                    <Icon name="edit" size={16} />
                                                </button>
                                                <button
                                                    onClick={() => handleDeleteMemo(memo.id)}
                                                    className="p-1.5 opacity-40 active:opacity-100 transition-all rounded-lg hover:bg-[var(--bp-accent-pale)]"
                                                    style={{color: 'var(--bp-text-soft)'}}
                                                >
                                                    <Icon name="trash" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            {memo.category === "Todo" && (
                                                <button
                                                    onClick={() => toggleDone(memo.id)}
                                                    className={`todo-check mt-0.5 ${memo.done ? 'done' : ''}`}
                                                    title={memo.done ? "完了を解除" : "完了にする"}
                                                >
                                                    {memo.done && <Icon name="check" size={14} />}
                                                </button>
                                            )}
                                            <p className="whitespace-pre-wrap leading-relaxed text-[15px] flex-1" style={{color: 'var(--bp-text)', textDecoration: memo.done ? 'line-through' : 'none', opacity: memo.done ? 0.5 : 1}}>{memo.content}</p>
                                        </div>
                                        {memo.files && memo.files.length > 0 && (
                                            <div className="mt-3 flex flex-wrap gap-2">
                                                {memo.files.map((file, idx) => (
                                                    <div key={idx}>
                                                        {file.type && file.type.startsWith('image/') ? (
                                                            <img src={file.data} className="w-20 h-20 object-cover rounded-xl border" style={{borderColor: 'var(--bp-border)'}} alt={file.name} />
                                                        ) : (
                                                            <div className="w-20 h-20 rounded-xl flex flex-col items-center justify-center p-2 text-center text-[10px]" style={{background: 'var(--bp-white)', border: '1.5px dashed var(--bp-accent-soft)'}}>
                                                                <Icon name="file" size={20} className="mb-1" style={{color: 'var(--bp-accent-deep)'}} />
                                                                <span className="truncate w-full">{file.name}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))
                            ) : (
                                <div className="text-center py-20 rounded-3xl border-2 border-dashed" style={{borderColor: 'var(--bp-accent-soft)', color: 'var(--bp-text-soft)', background: 'var(--bp-white)'}}>
                                    メモが見つかりません
                                </div>
                            )}
                        </div>
                    </>)}

                    {/* ===== カレンダービュー ===== */}
                    {currentView === "calendar" && (
                        <div className="anim-fade-up">
                            <div className="flex items-center justify-between mb-4">
                                <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-[var(--bp-accent-pale)] transition-all" style={{color: 'var(--bp-accent-deep)'}}>
                                    <Icon name="chevronL" size={22} />
                                </button>
                                <h2 className="text-lg font-bold" style={{color: 'var(--bp-text)'}}>{calYear}年 {calMonth + 1}月</h2>
                                <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-[var(--bp-accent-pale)] transition-all" style={{color: 'var(--bp-accent-deep)'}}>
                                    <Icon name="chevronR" size={22} />
                                </button>
                            </div>
                            <div className="cal-grid mb-2">
                                {["日","月","火","水","木","金","土"].map((d, i) => (
                                    <div key={d} className={`cal-header-cell ${i===0?'sun':''} ${i===6?'sat':''}`}>{d}</div>
                                ))}
                            </div>
                            <div className="cal-grid" style={{background: 'var(--bp-white)', borderRadius: 'var(--bp-radius-lg)', padding: '8px', border: '1px solid var(--bp-border)'}}>
                                {calendarCells.map((cell, idx) => {
                                    const dateStr = cell.current ? `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : '';
                                    const isToday = dateStr === todayStr;
                                    const isSelected = dateStr === selectedDate;
                                    const hasMemo = cell.current && memoDates.has(dateStr);
                                    
                                    let customColor = undefined;
                                    if (cell.current && !isSelected && !isToday) {
                                        const dateObj = new Date(calYear, calMonth, cell.day);
                                        const dayOfWeek = dateObj.getDay();
                                        const isHoliday = holidays[dateStr];
                                        if (dayOfWeek === 0 || isHoliday) customColor = '#EF4444';
                                        else if (dayOfWeek === 6) customColor = 'var(--bp-accent-deep)';
                                    }

                                    return (
                                        <div key={idx}
                                            className={`cal-cell ${!cell.current?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''} ${hasMemo?'has-memo':''}`}
                                            onClick={() => cell.current && setSelectedDate(dateStr === selectedDate ? null : dateStr)}
                                            style={customColor ? { color: customColor } : {}}
                                        >{cell.day}</div>
                                    );
                                })}
                            </div>
                            {selectedDate && (
                                <div className="mt-4 space-y-3">
                                    <h3 className="text-sm font-bold" style={{color: 'var(--bp-text-soft)'}}>{selectedDate.replace(/-/g, '/')} のメモ ({calDateMemos.length}件)</h3>
                                    {calDateMemos.length > 0 ? calDateMemos.map(memo => (
                                        <div key={memo.id} className="memo-card p-4 anim-fade-up">
                                            <div className="flex justify-between items-start mb-1">
                                                <div className="flex items-center gap-2">
                                                    <span className={`px-2 py-0.5 text-[10px] font-bold rounded-full ${badgeClass(memo.category)}`}>{memo.category}</span>
                                                    <span className="text-xs" style={{color: 'var(--bp-text-soft)'}}>{memo.date ? memo.date.slice(11,16) : ''}</span>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => handleEditMemo(memo)} className="p-1 opacity-40 active:opacity-100" style={{color: 'var(--bp-text-soft)'}}><Icon name="edit" size={14} /></button>
                                                    <button onClick={() => handleDeleteMemo(memo.id)} className="p-1 opacity-40 active:opacity-100" style={{color: 'var(--bp-text-soft)'}}><Icon name="trash" size={14} /></button>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-2.5">
                                                {memo.category === "Todo" && (
                                                    <button
                                                        onClick={() => toggleDone(memo.id)}
                                                        className={`todo-check mt-0.5 ${memo.done ? 'done' : ''}`}
                                                        style={{width: 20, height: 20}}
                                                    >
                                                        {memo.done && <Icon name="check" size={12} />}
                                                    </button>
                                                )}
                                                <p className="text-sm whitespace-pre-wrap flex-1" style={{color: 'var(--bp-text)', textDecoration: memo.done ? 'line-through' : 'none', opacity: memo.done ? 0.5 : 1}}>{memo.content}</p>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="text-center py-8 text-sm" style={{color: 'var(--bp-text-soft)'}}>この日のメモはありません</div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    </main>

                    {/* ===== FAB ===== */}
                    {!formDefaults && (
                        <button
                                            onClick={openNewForm}
                                            className="fab-btn btn-main"
                                        >
                            <Icon name="plus" size={28} />
                        </button>
                    )}

                    {/* ===== 新規メモモーダル ===== */}
                    {formDefaults && (
                        <MemoForm
                            initialValues={formDefaults}
                            editingId={editingId}
                            onSubmit={handleSaveMemo}
                            onClose={closeForm}
                        />
                    )}

                    {/* ===== ボトムナビゲーション ===== */}
                    <nav className="bottom-nav">
                        <button className={`bottom-nav-item ${currentView==='home'?'active':''}`} onClick={() => setCurrentView('home')}>
                            <span className="nav-icon-wrap"><Icon name="home" size={20} /></span>
                            <span>ホーム</span>
                        </button>
                        <button className={`bottom-nav-item ${currentView==='calendar'?'active':''}`} onClick={() => setCurrentView('calendar')}>
                            <span className="nav-icon-wrap"><Icon name="calendar" size={20} /></span>
                            <span>カレンダー</span>
                        </button>
                        <button className="bottom-nav-item" onClick={openNewForm}>
                            <span className="nav-icon-wrap" style={{background: 'var(--bp-gradient)', borderRadius: '12px'}}><Icon name="plus" size={20} className="text-white" /></span>
                            <span>新規</span>
                        </button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
